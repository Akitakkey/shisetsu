<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施設訪問記録</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f2f7;--card:#ffffff;--blue:#007aff;--blue-bg:rgba(0,122,255,.07);
  --green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --p1:#1c1c1e;--p2:#636366;--p3:#c7c7cc;
  --sep:rgba(60,60,67,.12);--fill:#f2f2f7;--inset:#e5e5ea;
  --r:14px;--rsm:10px;
  --shadow-xs:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --shadow-lg:0 16px 48px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  background:var(--bg);color:var(--p1);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;}

/* Navbar */
.nav{background:rgba(248,248,252,.88);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(60,60,67,.08);height:56px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;}
.nav-title{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.nav-date{font-size:12px;color:var(--p2);}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(118,118,128,.12);
  color:var(--p1);font-size:16px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .2s,transform .15s;}
.icon-btn:hover{background:rgba(118,118,128,.2);}
.icon-btn:active{transform:scale(.94);}

/* Content */
.content{max-width:860px;margin:0 auto;padding:20px 12px 110px;}

/* Card */
.card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:16px;
  box-shadow:var(--shadow-xs);}
.sec-label{font-size:11px;font-weight:600;color:var(--p2);text-transform:uppercase;
  letter-spacing:.6px;padding:0 4px 10px;display:block;}

/* Patient row */
.p-row{padding:14px 16px;border-bottom:1px solid var(--sep);
  display:flex;align-items:center;gap:10px;}
.p-row:last-of-type{border-bottom:none;}
.p-room{font-size:15px;font-weight:600;min-width:36px;color:var(--p1);}
.p-name{flex:1;font-size:15px;}
.p-pts{font-size:12px;color:var(--p2);white-space:nowrap;}

/* Toggle switch */
.sw{position:relative;width:44px;height:26px;flex-shrink:0;}
.sw input{display:none;}
.sw-track{position:absolute;inset:0;background:var(--inset);border-radius:13px;
  cursor:pointer;transition:background .22s cubic-bezier(.4,0,.2,1);}
.sw input:checked+.sw-track{background:var(--green);}
.sw-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;
  background:#fff;border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.18),0 1px 2px rgba(0,0,0,.12);
  transition:transform .22s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.sw input:checked~.sw-thumb{transform:translateX(18px);}

/* Badges */
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;
  letter-spacing:.1px;}
.badge-done{background:rgba(52,199,89,.15);color:#248a3d;}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rsm);border:none;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);font-family:inherit;letter-spacing:-.1px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--blue);color:#fff;
  box-shadow:0 1px 4px rgba(0,122,255,.3),0 1px 2px rgba(0,122,255,.2);}
.btn-primary:hover{background:#0070eb;box-shadow:0 2px 8px rgba(0,122,255,.35),0 1px 3px rgba(0,122,255,.25);}
.btn-primary:active{background:#0064d3;box-shadow:none;}
.btn-primary:disabled{background:var(--p3);box-shadow:none;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(118,118,128,.12);color:var(--p1);}
.btn-secondary:hover{background:rgba(118,118,128,.18);}
.btn-ghost{background:transparent;color:var(--blue);padding:6px 10px;font-weight:500;}
.btn-ghost:hover{background:var(--blue-bg);}
.btn-danger{background:transparent;color:var(--red);padding:6px 10px;}
.btn-danger:hover{background:rgba(255,59,48,.08);}
.btn-sm{padding:5px 12px;font-size:13px;}
.btn-full{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:var(--r);
  letter-spacing:-.1px;}

/* Form */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:500;color:var(--p2);margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;letter-spacing:.1px;}
textarea,input[type=text],input[type=password],select{
  width:100%;padding:10px 13px;border:1px solid var(--sep);border-radius:var(--rsm);
  font-size:14px;font-family:inherit;color:var(--p1);background:var(--card);
  resize:vertical;line-height:1.6;outline:none;
  transition:border-color .18s,box-shadow .18s;
  box-shadow:var(--shadow-xs);}
textarea:focus,input:focus,select:focus{
  border-color:var(--blue);box-shadow:0 0 0 3.5px rgba(0,122,255,.14),var(--shadow-xs);}

/* Points chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 15px;border-radius:20px;border:1.5px solid var(--sep);background:var(--card);
  color:var(--p1);font-size:13px;cursor:pointer;transition:all .18s;font-family:inherit;
  font-weight:500;}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.chip.sel{background:var(--blue);color:#fff;border-color:var(--blue);
  box-shadow:0 1px 4px rgba(0,122,255,.3);}

/* Input panel (expanded) */
.p-input{background:var(--fill);border-top:1px solid var(--sep);padding:16px;}

/* Dropzone */
.dropzone{border:2px dashed var(--inset);border-radius:var(--r);padding:36px 20px;
  text-align:center;color:var(--p2);cursor:pointer;transition:all .22s;margin-bottom:16px;}
.dropzone:hover,.dropzone.over{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.dz-icon{font-size:32px;margin-bottom:8px;}
.dz-title{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-.2px;}
.dz-sub{font-size:12px;color:var(--p3);}

/* Progress */
.prog-wrap{background:var(--card);border-radius:var(--r);padding:16px 18px;
  margin-bottom:16px;box-shadow:var(--shadow-xs);}
.prog-text{display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:var(--p2);margin-bottom:12px;}
.prog-text strong{color:var(--p1);font-weight:600;}
.prog-bar{height:5px;background:var(--inset);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#34aadc);
  border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* Action bar */
.action-bar{position:fixed;bottom:0;left:0;right:0;
  background:rgba(248,248,252,.92);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid rgba(60,60,67,.08);
  padding:12px 20px calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;justify-content:center;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:20px;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-hd{padding:20px 20px 15px;border-bottom:1px solid var(--sep);
  display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.modal-body{padding:20px;}
.modal-ft{padding:15px 20px;border-top:1px solid var(--sep);
  display:flex;gap:8px;justify-content:flex-end;}

/* Toast */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(4px);
  background:rgba(28,28,30,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:500;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  box-shadow:var(--shadow-md);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Today list */
.today-card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-xs);}
.today-hd{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:background .15s;}
.today-hd:hover{background:rgba(0,0,0,.02);}
.today-body{display:none;padding:0 16px 16px;}
.today-body.open{display:block;}

/* Setup */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center;}
.setup-icon{font-size:56px;margin-bottom:20px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));}
.setup-title{font-size:24px;font-weight:700;margin-bottom:10px;letter-spacing:-.4px;}
.setup-desc{font-size:15px;color:var(--p2);margin-bottom:32px;max-width:280px;line-height:1.65;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Spinner */
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:spin .55s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.err{background:rgba(255,59,48,.07);border:1px solid rgba(255,59,48,.2);color:#c0392b;
  padding:11px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:12px;
  line-height:1.5;}

/* Utils */
hr{border:none;border-top:1px solid var(--sep);margin:16px 0;}
.flex-bc{display:flex;justify-content:space-between;align-items:center;}
.flex-c{display:flex;align-items:center;}
.gap-8{gap:8px;}
.mt-12{margin-top:12px;}
.text-sm{font-size:13px;}
.text-xs{font-size:12px;}
.text-p2{color:var(--p2);}
.w100{width:100%;}
.empty{text-align:center;padding:36px 20px;color:var(--p2);}
.empty-icon{font-size:36px;margin-bottom:12px;}

/* Horizontal patient row */
.h-header,.h-row{
  display:grid;
  grid-template-columns:46px minmax(46px,64px) 3fr 4fr 40px 40px 72px 72px;
  gap:8px;padding:9px 12px;align-items:start;
}
.h-header{
  font-size:10px;font-weight:600;color:var(--p2);text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid var(--sep);
  padding:8px 14px;align-items:center;background:rgba(0,0,0,.01);
}
.h-row{border-bottom:1px solid rgba(60,60,67,.06);}
.h-row:last-of-type{border-bottom:none;}
.col-room{font-size:15px;font-weight:700;line-height:34px;color:var(--p1);}
.col-nc{display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px;}
.nc-lbl{font-size:10px;color:var(--p2);}
.cb-nc{width:18px;height:18px;cursor:pointer;accent-color:var(--green);margin-top:2px;}
.sw-danger input:checked+.sw-track{background:var(--red);}
.compact-ta{
  padding:7px 9px;resize:none;overflow:hidden;
  min-height:34px;line-height:1.5;font-size:13px;border-radius:7px;
}
.name-input{
  width:100%;border:none;background:transparent;font-size:14px;color:var(--p1);
  font-family:inherit;padding:0 7px;border-radius:7px;height:34px;outline:none;
  transition:background .15s,box-shadow .15s;
}
.name-input:hover{background:rgba(0,0,0,.04);}
.name-input:focus{background:var(--card);border:1.5px solid var(--blue);
  box-shadow:0 0 0 3px rgba(0,122,255,.12);}
.out-panel{background:rgba(0,0,0,.02);border-top:1px solid var(--sep);padding:14px;}

/* Facility dropdown */
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.fac-dropdown{position:fixed;background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow-md);z-index:300;min-width:210px;overflow:hidden;
  border:1px solid var(--sep);
  animation:fadeDown .16s cubic-bezier(.4,0,.2,1);}
.fac-dd-item{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;
  border-bottom:1px solid var(--sep);transition:background .15s;}
.fac-dd-item:last-of-type{border-bottom:none;}
.fac-dd-item:hover{background:var(--fill);}
.fac-dd-item.active .fac-dd-name{font-weight:600;}
.fac-dd-name{flex:1;font-size:15px;}
.fac-dd-tag{font-size:11px;color:var(--p2);}
.fac-dd-check{color:var(--blue);font-weight:700;font-size:15px;}
.fac-dd-add{padding:11px 16px;text-align:center;color:var(--blue);font-size:14px;
  font-weight:500;cursor:pointer;border-top:1px solid var(--sep);transition:background .15s;}
.fac-dd-add:hover{background:var(--fill);}

/* Calendar popover */
.cal-popover{position:fixed;background:var(--card);border-radius:20px;
  box-shadow:var(--shadow-lg);z-index:300;width:310px;padding:20px 18px 18px;
  border:1px solid var(--sep);
  animation:fadeDown .16s cubic-bezier(.4,0,.2,1);}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.cal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-month-title{font-size:15px;font-weight:600;letter-spacing:-.2px;}
.cal-nav-btn{background:rgba(118,118,128,.12);border:none;border-radius:50%;
  width:32px;height:32px;font-size:19px;cursor:pointer;color:var(--blue);
  display:flex;align-items:center;justify-content:center;transition:background .15s;
  line-height:1;}
.cal-nav-btn:hover{background:rgba(118,118,128,.22);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-hd{text-align:center;font-size:12px;font-weight:600;color:var(--p2);
  padding:4px 0 10px;}
.cal-day{text-align:center;font-size:14px;cursor:pointer;border-radius:50%;
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  transition:background .15s;}
.cal-day:hover:not(.other-month):not(.cal-today):not(.cal-selected){background:var(--fill);}
.cal-day.cal-today{background:var(--blue);color:#fff;font-weight:700;}
.cal-day.cal-selected{background:var(--blue);color:#fff;font-weight:700;}
.cal-day.other-month{color:var(--p3);cursor:default;}
</style>
</head>
<body>

<nav class="nav">
  <button class="btn btn-ghost" style="padding:4px 8px;font-size:16px;font-weight:600;"
    onclick="showFacilityPicker()" id="nav-fac">施設を選択 ▾</button>
  <button class="btn btn-ghost" id="nav-date"
    style="font-size:12px;color:var(--p2);padding:4px 8px;"
    onclick="showCalendarPicker()">
  </button>
  <input type="date" id="visit-date-input"
    style="position:fixed;left:50%;top:52px;transform:translateX(-50%);opacity:0;pointer-events:none;width:1px;height:1px;"
    onchange="applyVisitDate(this.value)">
  <div class="flex-c gap-8">
    <span id="settings-status" style="font-size:11px;color:var(--p2);white-space:nowrap;"></span>
    <button class="icon-btn" onclick="showPatientMgr()" title="患者管理" style="width:40px;height:40px;font-size:20px;">👥</button>
    <button class="icon-btn" onclick="showSettings()" title="設定" style="width:40px;height:40px;font-size:20px;">⚙️</button>
  </div>
</nav>

<div class="content" id="app"></div>

<div class="action-bar" id="action-bar" style="display:none">
  <button class="btn btn-secondary" onclick="downloadTxt()">⬇ ダウンロード</button>
  <button class="btn btn-primary" onclick="sendSlack()">✈ Slackに送信</button>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<script>
// ─── Constants & State ────────────────────────────────────────────────────────
const LS_FAC        = 'shisetsu_fac';
const LS_CUR        = 'shisetsu_cur';
const LS_TODAY      = 'shisetsu_today';
const LS_CLAUDE_API = 'shisetsu_claude_api';
const LS_PROXY      = 'shisetsu_proxy_url';
const LS_TDATE      = 'shisetsu_today_date';
const LS_NAME       = 'shisetsu_pharmacist_name';

// GASプロキシ経由でSlackに送る共通関数（CORS回避）
async function callProxy(payload) {
  const proxyUrl = (localStorage.getItem(LS_PROXY) || '').trim();
  if (!proxyUrl) throw new Error('GAS Proxy URLが未設定です');
  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  });
  if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
  return res.json();
}

let facilities   = [];
let currentFacId = null;
let todayVisits  = [];
const inputState = {}; // room -> {s, o, points, output, noChange}
let visitDate    = new Date();

// ─── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  load();
  updateNavDate();
  renderApp();
  updateSettingsStatus();
});

function updateNavDate() {
  const today = new Date();
  const isToday = fmtDate(visitDate) === fmtDate(today);
  const el = document.getElementById('nav-date');
  if (el) {
    el.textContent = isToday ? fmtDate(visitDate) : `📅 ${fmtDate(visitDate)}`;
    el.style.color      = isToday ? 'var(--p2)' : 'var(--blue)';
    el.style.fontWeight = isToday ? 'normal' : '600';
  }
  const inp = document.getElementById('visit-date-input');
  if (inp) inp.value = fmtISO(visitDate);
}

function applyVisitDate(val) {
  if (!val) return;
  const [y, m, d] = val.split('-').map(Number);
  visitDate = new Date(y, m - 1, d);
  updateNavDate();
}

function showVisitDateModal() {
  const iso = fmtISO(visitDate);
  showModal(`
    <div class="form-group">
      <div class="form-label">訪問日を選択</div>
      <input type="date" id="visit-date-modal-input" value="${iso}" style="width:auto;">
    </div>
  `, '訪問日',
  `<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
   <button class="btn btn-primary" onclick="applyVisitDate(document.getElementById('visit-date-modal-input').value);closeModal()">確定</button>`);
}

// ── カスタムカレンダー ────────────────────────────────────────
let _calY = null, _calM = null;

function showCalendarPicker() {
  document.getElementById('cal-popover')?.remove();
  const btn  = document.getElementById('nav-date');
  const rect = btn.getBoundingClientRect();

  _calY = visitDate.getFullYear();
  _calM = visitDate.getMonth();

  const el = document.createElement('div');
  el.id = 'cal-popover';
  el.className = 'cal-popover';

  const popW = 310;
  let left = rect.left + rect.width / 2 - popW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - popW - 8));
  el.style.left = left + 'px';
  el.style.top  = (rect.bottom + 8) + 'px';

  document.body.appendChild(el);
  _renderCal();
  setTimeout(() => document.addEventListener('click', _closeCalOutside), 10);
}

function _renderCal() {
  const el = document.getElementById('cal-popover');
  if (!el) return;

  const y = _calY, m = _calM;
  const today    = new Date();
  const selected = visitDate;
  const months   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const days     = ['日','月','火','水','木','金','土'];

  const firstDow     = new Date(y, m, 1).getDay();
  const daysInMonth  = new Date(y, m + 1, 0).getDate();
  const daysInPrev   = new Date(y, m, 0).getDate();
  const totalCells   = Math.ceil((firstDow + daysInMonth) / 7) * 7;

  let html = `
    <div class="cal-header">
      <span class="cal-title">日付を選択</span>
      <button class="icon-btn" style="width:28px;height:28px;font-size:13px" onclick="closeCalendarPicker()">✕</button>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="_calPrev()">‹</button>
      <span class="cal-month-title">${y}年 ${months[m]}</span>
      <button class="cal-nav-btn" onclick="_calNext()">›</button>
    </div>
    <div class="cal-grid">`;

  days.forEach((d, i) => {
    const c = i===0 ? 'color:var(--red)' : i===6 ? 'color:var(--blue)' : '';
    html += `<div class="cal-day-hd" style="${c}">${d}</div>`;
  });

  for (let i = firstDow - 1; i >= 0; i--)
    html += `<div class="cal-day other-month">${daysInPrev - i}</div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const date  = new Date(y, m, d);
    const isSel = fmtDate(date) === fmtDate(selected);
    const isTod = fmtDate(date) === fmtDate(today);
    const dow   = date.getDay();
    const col   = (!isSel && !isTod) ? (dow===0 ? 'color:var(--red)' : dow===6 ? 'color:var(--blue)' : '') : '';
    const cls   = 'cal-day' + (isSel ? ' cal-selected' : isTod ? ' cal-today' : '');
    html += `<div class="${cls}" style="${col}" onclick="_calSelect(${y},${m+1},${d})">${d}</div>`;
  }

  const nextDays = totalCells - firstDow - daysInMonth;
  for (let d = 1; d <= nextDays; d++)
    html += `<div class="cal-day other-month">${d}</div>`;

  html += `</div>`;
  el.innerHTML = html;
}

function _calPrev() { _calM--; if (_calM < 0) { _calM = 11; _calY--; } _renderCal(); }
function _calNext() { _calM++; if (_calM > 11) { _calM = 0; _calY++; } _renderCal(); }

function _calSelect(y, m, d) {
  applyVisitDate(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  closeCalendarPicker();
}

function closeCalendarPicker() {
  document.getElementById('cal-popover')?.remove();
  document.removeEventListener('click', _closeCalOutside);
}

function _closeCalOutside(e) {
  const cal = document.getElementById('cal-popover');
  const btn = document.getElementById('nav-date');
  if (cal && !cal.contains(e.target) && !btn.contains(e.target)) closeCalendarPicker();
}

// タッチキーボードを閉じて再度開いた際、フォーカス復元によるクリップボード自動ペーストを防ぐ
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && document.activeElement && document.activeElement.tagName !== 'BODY') {
    document.activeElement.blur();
  }
});
window.addEventListener('pageshow', e => {
  if (e.persisted && document.activeElement && document.activeElement.tagName !== 'BODY') {
    document.activeElement.blur();
  }
});

function load() {
  try { facilities  = JSON.parse(localStorage.getItem(LS_FAC)   || '[]'); } catch { facilities = []; }
  try { todayVisits = JSON.parse(localStorage.getItem(LS_TODAY)  || '[]'); } catch { todayVisits = []; }
  currentFacId = localStorage.getItem(LS_CUR) || null;
  if (currentFacId && !facilities.find(f => f.id === currentFacId)) currentFacId = null;
  // 日付が変わっていたら本日完了分をリセット
  if (localStorage.getItem(LS_TDATE) !== fmtDate(new Date())) {
    todayVisits = [];
    localStorage.removeItem(LS_TODAY);
  }
}

function save() {
  localStorage.setItem(LS_FAC,   JSON.stringify(facilities));
  localStorage.setItem(LS_TODAY, JSON.stringify(todayVisits));
  localStorage.setItem(LS_TDATE, fmtDate(new Date()));
  if (currentFacId) localStorage.setItem(LS_CUR, currentFacId);
}

function getFac() {
  return facilities.find(f => f.id === currentFacId) || null;
}

    fac.patients.forEach(p => { html += buildRow(p, fac); });
    html += `</div>

  if (done > 0) {
    html += `<span class="sec-label" style="margin-top:4px">本日完了分</span>`;
    todayVisits.forEach((v, i) => {
      html += `<div class="today-card">
        <div class="today-hd" onclick="toggleToday(${i})">
          <div>
            <span style="font-weight:600">${esc(v.room)}　${esc(v.name)}</span>
            <span class="text-xs text-p2" style="margin-left:8px">${esc(v.points)}</span>

  const pts          = st.points !== undefined ? st.points : p.defaultPoints;
  const sVal         = st.s || '';
  const oVal         = st.o || '';
  const out      = st.output || '';

  const rowDim  = isDone ? 'opacity:.4;pointer-events:none;' : isHosp ? 'opacity:.4;' : '';
  const dis     = isDone || isHosp ? 'disabled' : '';

  let html = `<div style="${rowDim}">
    <div class="h-row">
      <span class="col-room">${esc(p.room)}</span>

      <textarea class="compact-ta" id="s-${esc(p.room)}" rows="1" ${dis}
        oninput="storeInput('${esc(p.room)}','s',this.value);autoResize(this)">${esc(sVal)}</textarea>
      <div style="display:flex;flex-direction:column;gap:2px;min-width:0;">
        <textarea class="compact-ta" id="o-${esc(p.room)}" rows="1" ${dis}

      </div>
      <div class="col-nc" style="pointer-events:${isDone?'none':'auto'}">
        ${fac.hasA
          ? `<input type="checkbox" class="cb-nc" ${hasShinsatsu?'checked':''} ${dis}
               onchange="toggleShinsatsu('${esc(p.room)}',this.checked)">`
          : `<input type="checkbox" class="cb-nc" ${noChange?'checked':''} ${dis}
               onchange="toggleNoChange('${esc(p.room)}',this.checked)">`}
      </div>
      <div class="col-nc" style="pointer-events:auto;opacity:1;">

      ${isDone
        ? `<span class="badge badge-done" style="margin-top:5px">完了</span><span></span>`
        : isHosp
          ? `<span class="badge" style="background:#fff0f0;color:var(--red);margin-top:5px">入院中</span><span></span>`
          : `<button class="btn btn-primary btn-sm" style="margin-top:2px;white-space:nowrap"
               id="gen-${esc(p.room)}" onclick="generateRecord('${esc(p.room)}')">作成</button>
             ${p.lastRecord
               ? `<button class="btn btn-secondary btn-sm" style="margin-top:2px;white-space:nowrap"
                    onclick="showLastRecord('${esc(p.room)}')">前回記録</button>`
               : '<span></span>'}`}
    </div>
    <div id="err-${esc(p.room)}"></div>`;

  // Output panel — shown only after generation
  if (out && !isDone) {
    html += `<div class="out-panel">
      <div class="form-label" style="margin-bottom:6px">生成結果（編集可）</div>
      <div id="out-${esc(p.room)}" contenteditable="true"
        style="font-size:13px;line-height:1.8;white-space:pre-wrap;padding:9px 12px;

// ─── Patient interactions ─────────────────────────────────────────────────────
function updatePatientName(room, name) {
  const fac = getFac();
  const p = fac?.patients.find(p => p.room === room);
  if (p && name.trim()) { p.name = name.trim(); save(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function storeInput(room, key, val) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room][key] = val;
}

function initSt(room) {
  const fac = getFac();
  const p   = fac?.patients.find(p => p.room === room);
  return { s:'', o:'', points: p?.defaultPoints||'342点', output:'', noChange:false, hasShinsatsu:false };
}

function getDeliveryRange() {
  const now   = visitDate;
  const day   = now.getDay();
  const daysToNextMonday = ((8 - day) % 7) || 7;
  const start = new Date(now.getTime() + daysToNextMonday * 864e5);
  const end   = new Date(start.getTime() + 6 * 864e5);
  const s = `${start.getMonth()+1}/${start.getDate()}`;
  const e = `${end.getMonth()+1}/${end.getDate()}`;
  return { range: `${s}ー${e}`, start: s };
}

function toggleNoChange(room, checked) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room].noChange = checked;
  renderApp();
}

function toggleShinsatsu(room, checked) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room].hasShinsatsu = checked;
}

function toggleHospitalized(room, checked) {
  const fac = getFac();
  const p = fac?.patients.find(p => p.room === room);
  if (!p) return;
  p.hospitalized = checked;
  save();
  renderApp();
}

// ─── Claude ───────────────────────────────────────────────────────────────────
async function generateRecord(room) {
  const fac = getFac();
  const p   = fac.patients.find(p => p.room === room);
  const st  = inputState[room] || initSt(room);

  const sEl   = document.getElementById('s-' + room);
  const oEl   = document.getElementById('o-' + room);
  const sVal  = (sEl ? sEl.value : st.s).trim();
  const oVal  = (oEl ? oEl.value : st.o).trim();
  const prev  = (p.lastRecord || '').trim();
  const pts   = st.points || p.defaultPoints;

  if (sEl)   { st.s = sEl.value;   inputState[room] = st; }
  if (oEl)   { st.o = oEl.value;   inputState[room] = st; }

  const apiKey  = localStorage.getItem(LS_CLAUDE_API) || '';
  const proxyUrl = (localStorage.getItem(LS_PROXY) || '').trim();
  const errEl   = document.getElementById('err-' + room);
  errEl.innerHTML = '';

  if (!apiKey) {
    errEl.innerHTML = '<div class="err">⚠️ Claude APIキーが未設定です。右上 ⚙️ から入力してください。</div>';
    return;
  }
  if (!proxyUrl) {
    errEl.innerHTML = '<div class="err">⚠️ GAS Proxy URLが未設定です。右上 ⚙️ から入力してください。</div>';
    return;
  }

  const btn = document.getElementById('gen-' + room);
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 生成中...';

  const now      = visitDate;
  const reiwa    = now.getFullYear() - 2018;
  const reiwaStr = `R${reiwa}.${now.getMonth()+1}`;
  const dateStr  = `${now.getMonth()+1}/${now.getDate()}`;

  const noChange     = inputState[room]?.noChange || false;
  const hasShinsatsu = inputState[room]?.hasShinsatsu || false;
  const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);

  try {
    const text = normalize(await callClaude(apiKey, prompt));
    inputState[room].output = text;

    const errEl2 = document.getElementById('err-' + room);
    const container = errEl2?.parentElement;
    if (container) {
      const existing = container.querySelector('.out-panel');
      if (existing) existing.remove();
      const panelDiv = document.createElement('div');
      panelDiv.className = 'out-panel';
      panelDiv.innerHTML = `
        <div class="form-label" style="margin-bottom:6px">生成結果（編集可）</div>
        <div id="out-${room}" contenteditable="true"
          style="font-size:13px;line-height:1.8;white-space:pre-wrap;padding:9px 12px;
                 border:1px solid var(--sep);border-radius:var(--rsm);background:var(--card);
                 min-height:160px;outline:none;transition:border-color .15s,box-shadow .15s;
                 word-break:break-all;"
          onfocus="this.style.borderColor='var(--blue)';this.style.boxShadow='0 0 0 3px rgba(0,122,255,.12)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''"
          oninput="inputState['${room}'].output=this.innerText"
        >${renderBold(text)}</div>
        <button class="btn btn-primary btn-full" style="margin-top:8px"
          onclick="saveRecord('${room}')">✚ 一覧に追加して次の患者へ</button>
      `;
      container.appendChild(panelDiv);
    }
    const genBtn = document.getElementById('gen-' + room);
    if (genBtn) { genBtn.disabled = false; genBtn.innerHTML = '作成'; }
    showToast(`${p.name} の記録が完成しました ✓`, 3000);
  } catch(e) {
    errEl.innerHTML = `<div class="err">⚠️ ${esc(e.message)}</div>`;
    const b = document.getElementById('gen-' + room);
    if (b) { b.disabled = false; b.innerHTML = '作成'; }
  }
}

function showLastRecord(room) {
  const fac = getFac();
  const p   = fac?.patients.find(p => p.room === room);
  if (!p?.lastRecord) return;

  if (!inputState[room]) inputState[room] = initSt(room);

  const errEl    = document.getElementById('err-' + room);
  const container = errEl?.parentElement;
  if (!container) return;
  const existing = container.querySelector('.out-panel');
  if (existing) { existing.remove(); inputState[room].output = ''; return; }
  inputState[room].output = p.lastRecord;

  const panelDiv = document.createElement('div');
  panelDiv.className = 'out-panel';
  panelDiv.innerHTML = `
    <div class="form-label" style="margin-bottom:6px">前回の記録（編集可）</div>
    <div id="out-${room}" contenteditable="true"
      style="font-size:13px;line-height:1.8;white-space:pre-wrap;padding:9px 12px;
             border:1px solid var(--sep);border-radius:var(--rsm);background:var(--card);
             min-height:160px;outline:none;transition:border-color .15s,box-shadow .15s;
             word-break:break-all;"
      onfocus="this.style.borderColor='var(--blue)';this.style.boxShadow='0 0 0 3px rgba(0,122,255,.12)'"
      onblur="this.style.borderColor='';this.style.boxShadow=''"
      oninput="inputState['${room}'].output=this.innerText"
    >${renderBold(p.lastRecord)}</div>
    <button class="btn btn-primary btn-full" style="margin-top:8px"
      onclick="saveRecord('${room}')">✚ 一覧に追加して次の患者へ</button>
  `;
  container.appendChild(panelDiv);
}

function buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange=false, hasShinsatsu=false) {
  const hasA = fac.hasA;
  const noChangeNote = noChange ? `
【重要】今回は「変更なし」フラグが立っています。
・##S##：「${fac.noChangeS || '特に変わったことはなく過ごされています。落ち着いた療養が出来ています。'}」を ##S## の内容とし、冒頭に（施設スタッフ）を付ける。
・##O##：診察時サマリ部分を「${fac.noChangeO || '内科的に特に問題はない。現行治療で継続。\n※処方変更なし。'}」とする。処方変更なしとして扱う。
・##A##（Aあり施設のみ）：##OP##から2剤をピックアップし、効果が得られているか副作用（具体的症状）が出ていないかをアセスメントする。【バリエーション必須】前回Aと異なる薬剤を選ぶこと。
・##EP##：##OP##から2剤を抽出し副作用（具体的な症状）への注意を促す指導内容を作成する。「このままお薬を続けましょう」は不可。必ず薬の効果・副作用に言及すること。【バリエーション必須】前回EPと異なる薬剤・内容を取り上げること。
` : '';

  if (hasA) {
    const { range: deliveryRange, start: deliveryStart } = getDeliveryRange();
    const noChangeS = fac.noChangeS || '特に変わったことはなく過ごされています。落ち着いた療養が出来ています。';
    // ナーシングホーム用（A あり：S・O・A・EP・OP）
    return `あなたは在宅医療に特化した薬局に勤めるベテラン薬剤師として、施設訪問薬歴の作成を支援するAIです。薬学的管理に精通しており、特に緩和ケア・褥瘡領域に秀でた立場で記録を作成してください。
${noChangeNote}
【本日の日付】${reiwaStr}（${dateStr}）
【算定点数】${pts}

【今回のS入力】
${sVal || '（入力なし）'}

【今回のO入力（配薬日付・診察サマリなど）】
${oVal || '（入力なし）'}

【前回の記録】
${prev || '（なし）'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━
【出力形式】余計な前置き・説明は一切加えず以下の形式のみで出力すること。

##S##
##O##
##A##
##EP##
##OP##

━━━━━━━━━━━━━━━━━━━━━━━━━━━
【各項目のルール】

①##S##
${sVal.trim()
  ? `今回のS入力を要約・言い換えせずそのまま記載する。
入力内容の文脈から（施設スタッフ）または（本人）かを推定し、冒頭に付けて改行してから内容を記載する。入力に「本人」「家族」「娘さん」などの話者を示す語がある場合はそれを（　）で括った形式にする。`
  : `S入力が空欄のため「${noChangeS}」を ##S## の内容とする。冒頭に（施設スタッフ）を付けて改行してから記載する。`}

②##O##
冒頭は必ず「定期訪問、定期配薬：」から始める。出力に空白行を入れないこと。
【重要】今回の配薬期間は「${deliveryRange}」である。前回記録のOに書かれた配薬日程は絶対に引き継がず、必ず今回の配薬期間を使うこと。

【定時薬の配薬期間】
・O入力に期間指定（例：「定時薬 6/2-5」「6/2まで」「6/2ー6/5」「M/DーM/D」等）がある場合 → その期間をそのまま使う。自動計算値（${deliveryRange}）は絶対に使わない。
・O入力に期間指定がない場合のみ → 自動計算値 ${deliveryRange} を使う。

【追加薬剤】
・O入力に「・薬剤名　数量」等の追加薬剤行がある場合 → 定時薬行の直下にそのまま全て追記する。内容は一切変えない。
・O入力が空欄の場合：##O##に以下をそのまま一字一句出力すること（日付を自分で計算してはならない）：
定期訪問、定期配薬：
・定時薬　${deliveryRange}　※処方変更なし

async function callClaude(apiKey, prompt) {
  const proxyUrl = (localStorage.getItem(LS_PROXY) || '').trim();
  if (!proxyUrl) throw new Error('GAS Proxy URLが未設定です');

  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify({
      type: 'claude',
      apiKey,
      model: 'claude-haiku-4-5-20251001',
      maxTokens: 8192,
      system: 'あなたは訪問薬剤師の施設訪問記録作成を支援する専門アシスタントです。以下の方針で記載してください。\n・簡潔・正確な医療日本語で記載する\n・感情的表現・共感表現・励まし・お気持ち系の言葉は一切使わない\n・薬剤師としての専門的視点（薬効・副作用・相互作用）から客観的に記録する\n・患者の「気持ち」ではなく「状態」を記録する',
      messages: [{ role: 'user', content: prompt }]
    }),
    redirect: 'follow'
  });

  if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
  const data = await res.json();
  if (data.ok === false) throw new Error(typeof data.error === 'string' ? data.error : 'プロキシエラー');
  if (data.error) {
    const msg = typeof data.error === 'string' ? data.error
      : (data.error.message || data.error.type || 'Claude APIエラー');
    throw new Error(msg);
  }
  const text = data.content?.[0]?.text;
  if (!text) throw new Error('レスポンスが空です');
  return text;
}

function showBulkSOInput() {
  showModal(`
    <div class="form-group">
      <div class="form-label">S/O一括入力</div>
      <div class="text-xs text-p2" style="margin-bottom:8px">

        placeholder="201　落ち着いています。&#10;202　掻痒感が続いています。　レボセチリジン追加。"></textarea>
    </div>
  `, 'S/O一括入力',

function applyBulkSO() {
  const raw = document.getElementById('bulk-so-input')?.value || '';
  const fac = getFac();
  if (!fac) return;

  let count = 0;
  for (const line of raw.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split('　');
    const room = parts[0]?.trim();
    if (!room || !fac.patients.find(p => p.room === room)) continue;
    if (!inputState[room]) inputState[room] = initSt(room);
    inputState[room].s = parts[1]?.trim() || '';
    inputState[room].o = parts.slice(2).join('　').trim();
    count++;
  }

  closeModal();
  showToast(`${count}名分のS/Oを反映しました`);
  renderApp();
  // テキストエリアのサイズ調整
  setTimeout(() => {
    fac.patients.forEach(p => {
      ['s-','o-'].forEach(pre => {
        const el = document.getElementById(pre + p.room);
        if (el) autoResize(el);
      });
    });
  }, 50);
}

// ─── Bulk generate ───────────────────────────────────────────────────────────
async function generateAll() {
  const fac = getFac();
  if (!fac) return;

  const apiKey   = localStorage.getItem(LS_CLAUDE_API) || '';
  const proxyUrl = (localStorage.getItem(LS_PROXY) || '').trim();
  if (!apiKey) {
    showToast('⚠️ Claude APIキーを設定してください');
    return;
  }
  if (!proxyUrl) {
    showToast('⚠️ GAS Proxy URLを設定してください');
    return;
  }

  const pending = fac.patients.filter(p =>
    !todayVisits.some(v => v.room === p.room) && !p.hospitalized
  );
  if (!pending.length) { showToast('全員完了済みです（入院中を除く）'); return; }

  const btn = document.getElementById('bulk-btn');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }

  let count = 0;
  for (const p of pending) {
    if (!inputState[p.room]) inputState[p.room] = initSt(p.room);
    const st = inputState[p.room];

    const now      = visitDate;
    const reiwa    = now.getFullYear() - 2018;
    const reiwaStr = `R${reiwa}.${now.getMonth()+1}`;
    const dateStr  = `${now.getMonth()+1}/${now.getDate()}`;
    const pts      = st.points || p.defaultPoints;
    const sVal     = st.s || '';
    const oVal     = st.o || '';
    const prev     = p.lastRecord || '';
    const noChange     = st.noChange || false;
    const hasShinsatsu = st.hasShinsatsu || false;

    showToast(`${p.room}号室 作成中… (${count+1}/${pending.length})`, 60000);

    try {
      const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);
      const text   = normalize(await callClaude(apiKey, prompt));

      const rec = { room: p.room, name: p.name, points: pts, content: text };
      const idx = todayVisits.findIndex(v => v.room === p.room);
      if (idx >= 0) todayVisits[idx] = rec; else todayVisits.push(rec);
      todayVisits.sort((a, b) => Number(a.room) - Number(b.room));
      p.lastRecord  = text;
      p.lastUpdated = fmtDate(now);
      count++;
      save();
    } catch(e) {
      if (e.message.includes('429') || e.message.includes('rate_limit') || e.message.includes('overloaded')) {
        showToast(`レート制限に達しました。10秒待機中…`, 10000);
        await new Promise(r => setTimeout(r, 10000));
        try {
          const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);
          const text   = normalize(await callClaude(apiKey, prompt));
          const rec = { room: p.room, name: p.name, points: pts, content: text };
          const idx = todayVisits.findIndex(v => v.room === p.room);
          if (idx >= 0) todayVisits[idx] = rec; else todayVisits.push(rec);
          p.lastRecord  = text;
          p.lastUpdated = fmtDate(now);
          count++;
          save();
        } catch(e2) {
          showToast(`${p.room}号室 エラー: ${e2.message}`, 4000);
        }
      } else {
        showToast(`${p.room}号室 エラー: ${e.message}`, 4000);
        await new Promise(r => setTimeout(r, 1000));
      }
    }
  }

  save();
  showToast(`一括作成完了：${count}名`);
  renderApp();
}

// ─── Save record ──────────────────────────────────────────────────────────────
function saveRecord(room) {
  const outEl   = document.getElementById('out-' + room);
  const content = (outEl ? outEl.innerText : (inputState[room]?.output || '')).replace(/\*\*/g, '').trim();
  if (!content) { showToast('生成結果がありません'); return; }

  const fac = getFac();
  const p   = fac.patients.find(p => p.room === room);
  const pts = inputState[room]?.points || p.defaultPoints;

  const rec = { room, name: p.name, points: pts, content };
  const idx = todayVisits.findIndex(v => v.room === room);
  if (idx >= 0) todayVisits[idx] = rec;
  else todayVisits.push(rec);
  todayVisits.sort((a, b) => Number(a.room) - Number(b.room));

  // Update patient last record
  p.lastRecord  = content;
  p.lastUpdated = fmtDate(visitDate);

  save();
  delete inputState[room];
  showToast(`${room}号室 ${p.name} を保存しました`);
  renderApp();
}

function downloadTxt() {
  if (!todayVisits.length) { showToast('ダウンロードする記録がありません'); return; }
  const fac = getFac();
  const today = visitDate;
  const ds = `${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
  const fname = `${fac?.name||'施設'}_${ds}.txt`;

  const text = todayVisits.map(v =>
    `${v.room}　${v.name}　${v.points}\n\n${v.content}`
  ).join('\n\n\n');

  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

  }
  if (!todayVisits.length) { showToast('送信する記録がありません'); return; }

  const todayStr = fmtISO(visitDate);
  const tmpl = fac.slackMessage || '{施設名}　{月}月{日}日に転記お願いします。';

  showModal(`
    <div class="form-group">

   <button class="btn btn-primary" onclick="execSlackSend()">送信</button>`);

function updateSlackPreview() {
  const fac      = getFac();
  const dateEl   = document.getElementById('slack-date');
  const previewEl= document.getElementById('slack-msg-preview');
  if (!dateEl || !previewEl) return;

  const [y, m, d] = dateEl.value.split('-');
  const tmpl  = fac.slackMessage || '{施設名}　{月}月{日}日に転記お願いします。';
  const pname = localStorage.getItem(LS_NAME) || '';
  previewEl.value = tmpl
    .replace(/{施設名}/g, fac.name)
    .replace(/{月}/g, String(Number(m)))
    .replace(/{日}/g, String(Number(d)))
    .replace(/{薬剤師名}/g, pname);
}

async function execSlackSend() {
  const fac     = getFac();
  const dateEl  = document.getElementById('slack-date');
  const msgEl   = document.getElementById('slack-msg-preview');
  const message = msgEl?.value || '';
  const dateVal = dateEl?.value || '';
  const ds      = dateVal.replace(/-/g, '');

  closeModal();

  const fname = `${fac.name}_${ds}.txt`;
  const text  = todayVisits.map(v =>
    `${v.room}　${v.name}　${v.points}\n\n${v.content}`
  ).join('\n\n\n');

  try {
    const data = await callProxy({
      token: fac.slackToken,
      channelId: fac.slackChannel,
      filename: fname,
      content: text,
      initialComment: message
    });
    if (!data.ok) throw new Error(data.error || 'unknown error');
    showToast('Slackに送信しました ✓');
  } catch(e) {
    showToast('送信エラー: ' + e.message);
  }
}

// ─── File import ──────────────────────────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById('dz')?.classList.add('over'); }
function onDragLeave()  { document.getElementById('dz')?.classList.remove('over'); }
function onDrop(e)      { e.preventDefault(); document.getElementById('dz')?.classList.remove('over');
  const f = e.dataTransfer.files[0]; if (f) readFile(f); }
function onFileInput(e) { const f = e.target.files[0]; if (f) readFile(f); e.target.value = ''; }

function readFile(file) {
  const r = new FileReader();
  r.onload = e => importText(e.target.result);
  r.readAsText(file, 'UTF-8');
}

function importText(raw) {
  const fac = getFac();
  if (!fac) return;

  const lines  = raw.split('\n');
  const blocks = [];
  let cur = null;

  for (const line of lines) {
    // 行頭の # を除去してから判定（###101　山田　太郎 などに対応）
    const stripped = line.replace(/^[#＃]+/, '').trim();
    const m = stripped.match(/^(\d{2,4})[　\s]+/);
    if (m && stripped.length <= 30 && !stripped.match(/^##[SOAEP]/)) {
      if (cur) blocks.push(cur);
      const parts = stripped.split(/[　\s]+/);
      const room = parts[0];
      const pointsStr = parts.find(p => p.endsWith('点')) || '';
      // 部屋番号・点数以外をすべて結合（姓名間スペース対応）
      const nameParts = parts.slice(1).filter(p => !p.endsWith('点') && p.trim());
      cur = {
        room,
        name  : nameParts.join(''),
        points: pointsStr,
        lines : []
      };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) blocks.push(cur);

  let added = 0, updated = 0;

  for (const b of blocks) {
    const rawBlock = b.lines.join('\n').trim();
    if (!rawBlock) continue;
    const start  = rawBlock.indexOf('##');
    const record = start >= 0 ? rawBlock.substring(start).trim() : rawBlock;

    const existing = fac.patients.find(p => p.room === b.room);
    if (existing) {
      existing.lastRecord  = record;
      existing.lastUpdated = fmtDate(new Date());
      if (b.name) existing.name = b.name;
      if (b.points) existing.defaultPoints = b.points;
      updated++;
    } else {
      fac.patients.push({
        room         : b.room,
        name         : b.name || `${b.room}号室`,
        defaultPoints: b.points || '342点',
        lastRecord   : record,
        lastUpdated  : fmtDate(new Date())
      });
      added++;
    }
  }

  fac.patients.sort((a, b) => Number(a.room) - Number(b.room));
  save();
  showToast(`取り込み完了：新規 ${added}名・更新 ${updated}名`);
  renderApp();
}

  if (fac.patients.find(p => p.room === room)) { alert(`${room}号室はすでに登録されています`); return; }

  fac.patients.push({
    room, name,
    defaultPoints: pts || '342点',
    lastRecord   : dis ? buildInitialOP(dis) : '',
    lastUpdated  : dis ? fmtDate(new Date()) : ''
  });
  fac.patients.sort((a, b) => Number(a.room) - Number(b.room));
  save();
  showToast(`${room}号室 ${name} を追加しました`);
  showPatientMgr();
}

function buildInitialOP(diseases) {
  const lines = diseases.split('\n').filter(l => l.trim());
  let op = '##OP##\n';
  for (const line of lines) {
    const parts   = line.trim().split(/[\s　]+/);
    const disease = parts[0] || '';
    const drugs   = parts.slice(1).join('、');
    if (disease) {
      op += `＃${disease}\n`;
      if (drugs) op += `　・${drugs}\n`;
    }
  }
  return op;
}

// ── Edit patient ──
function showEditPatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  showModal(`
    <div class="form-group">
      <div class="form-label">部屋番号</div>
      <input type="text" id="ep-room" value="${esc(p.room)}">
    </div>
    <div class="form-group">
      <div class="form-label">氏名</div>
      <input type="text" id="ep-name" value="${esc(p.name)}">
    </div>
    <div class="form-group">
      <div class="form-label">デフォルト算定点数</div>
      <input type="text" id="ep-pts" value="${esc(p.defaultPoints)}">
    </div>
    <div class="form-group">
      <div class="form-label">
        前回記録 / OP
        <span class="text-xs text-p2">${p.lastUpdated ? '最終: '+p.lastUpdated : '新患'}</span>
      </div>
      <textarea id="ep-rec" rows="10" style="font-size:12px">${esc(p.lastRecord||'')}</textarea>
    </div>
  `, `${esc(p.room)}号室 ${esc(p.name)}`,
  `<button class="btn btn-secondary" onclick="showPatientMgr()">キャンセル</button>
   <button class="btn btn-primary" onclick="updatePatient(${i})">保存</button>`);
}

function updatePatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  p.room          = document.getElementById('ep-room')?.value.trim() || p.room;
  p.name          = document.getElementById('ep-name')?.value.trim() || p.name;
  p.defaultPoints = document.getElementById('ep-pts') ?.value.trim() || p.defaultPoints;
  p.lastRecord    = document.getElementById('ep-rec') ?.value || '';
  fac.patients.sort((a, b) => Number(a.room) - Number(b.room));
  save(); showToast('更新しました'); showPatientMgr();
}

function deletePatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  if (!confirm(`${p.room}号室 ${p.name} を削除しますか？`)) return;
  fac.patients.splice(i, 1);
  save(); showPatientMgr();
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function renderBold(text) {
  return text.split(/(\*\*[\s\S]+?\*\*)/).map((part, i) => {
    if (i % 2 === 1) return `<strong>${esc(part.slice(2, -2))}</strong>`;
    return esc(part);
  }).join('');
}

function normalize(t) {
  return t
    .replace(/㎎/g,'mg').replace(/㎜/g,'mm').replace(/㎝/g,'cm')
    .replace(/㎞/g,'km').replace(/㎏/g,'kg').replace(/㎖/g,'mL')
    .replace(/㏄/g,'cc').replace(/㎡/g,'m2').replace(/℃/g,'°C')
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/[ａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/(\d)X/g, '$1×');
}

function fmtDate(d) {
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
}

function fmtISO(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function showToast(msg, ms=2400) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
