<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施設訪問記録</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f7;--card:#fff;--blue:#007aff;--blue-bg:rgba(0,122,255,.08);
  --green:#34c759;--red:#ff3b30;--p1:#1d1d1f;--p2:#6e6e73;--p3:#aeaeb2;
  --sep:#d2d2d7;--fill:#f2f2f7;--r:12px;--rsm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  background:var(--bg);color:var(--p1);font-size:14px;line-height:1.5;}

/* Navbar */
.nav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:.5px solid var(--sep);height:52px;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50;}
.nav-title{font-size:16px;font-weight:600;}
.nav-date{font-size:12px;color:var(--p2);}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--fill);
  color:var(--blue);font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .15s;}
.icon-btn:hover{background:#e5e5ea;}

/* Content */
.content{max-width:800px;margin:0 auto;padding:20px 16px 100px;}

/* Card */
.card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.sec-label{font-size:12px;font-weight:600;color:var(--p2);text-transform:uppercase;
  letter-spacing:.5px;padding:0 4px 8px;display:block;}

/* Patient row */
.p-row{padding:13px 16px;border-bottom:.5px solid var(--fill);
  display:flex;align-items:center;gap:10px;}
.p-row:last-of-type{border-bottom:none;}
.p-room{font-size:15px;font-weight:600;min-width:36px;}
.p-name{flex:1;font-size:15px;}
.p-pts{font-size:12px;color:var(--p2);white-space:nowrap;}

/* Toggle switch */
.sw{position:relative;width:42px;height:24px;flex-shrink:0;}
.sw input{display:none;}
.sw-track{position:absolute;inset:0;background:var(--sep);border-radius:12px;
  cursor:pointer;transition:background .2s;}
.sw input:checked+.sw-track{background:var(--green);}
.sw-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;
  background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);
  transition:transform .2s;pointer-events:none;}
.sw input:checked~.sw-thumb{transform:translateX(18px);}

/* Badges */
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-done{background:#d4edda;color:#155724;}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--rsm);border:none;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:#0066d6;}
.btn-primary:disabled{background:var(--p3);cursor:not-allowed;}
.btn-secondary{background:var(--fill);color:var(--p1);}
.btn-secondary:hover{background:#e5e5ea;}
.btn-ghost{background:transparent;color:var(--blue);padding:6px 10px;}
.btn-ghost:hover{background:var(--blue-bg);}
.btn-danger{background:transparent;color:var(--red);padding:6px 10px;}
.btn-danger:hover{background:rgba(255,59,48,.08);}
.btn-sm{padding:5px 12px;font-size:13px;}
.btn-full{width:100%;padding:13px;font-size:15px;border-radius:var(--r);}

/* Form */
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:500;color:var(--p2);margin-bottom:5px;
  display:flex;justify-content:space-between;align-items:center;}
textarea,input[type=text],input[type=password],select{
  width:100%;padding:9px 12px;border:1px solid var(--sep);border-radius:var(--rsm);
  font-size:14px;font-family:inherit;color:var(--p1);background:var(--card);
  resize:vertical;line-height:1.6;outline:none;transition:border-color .15s,box-shadow .15s;}
textarea:focus,input:focus,select:focus{
  border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12);}

/* Points chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--sep);background:var(--card);
  color:var(--p1);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.chip.sel{background:var(--blue);color:#fff;border-color:var(--blue);}

/* Input panel (expanded) */
.p-input{background:var(--fill);border-top:.5px solid var(--sep);padding:16px;}

/* Dropzone */
.dropzone{border:2px dashed var(--sep);border-radius:var(--r);padding:28px 20px;
  text-align:center;color:var(--p2);cursor:pointer;transition:all .2s;margin-bottom:16px;}
.dropzone:hover,.dropzone.over{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.dz-icon{font-size:28px;margin-bottom:6px;}
.dz-title{font-size:15px;font-weight:500;margin-bottom:3px;}
.dz-sub{font-size:12px;}

/* Progress */
.prog-wrap{margin-bottom:16px;}
.prog-text{display:flex;justify-content:space-between;font-size:13px;color:var(--p2);margin-bottom:6px;}
.prog-bar{height:4px;background:var(--fill);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}

/* Action bar */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--sep);
  padding:12px 16px;display:flex;gap:10px;justify-content:center;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:460px;
  max-height:88vh;overflow-y:auto;}
.modal-hd{padding:18px 18px 14px;border-bottom:.5px solid var(--sep);
  display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:16px;font-weight:600;}
.modal-body{padding:18px;}
.modal-ft{padding:14px 18px;border-top:.5px solid var(--sep);
  display:flex;gap:8px;justify-content:flex-end;}

/* Toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:#1d1d1f;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}

/* Today list */
.today-card{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.today-hd{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.today-hd:hover{background:var(--fill);}
.today-body{display:none;padding:0 16px 14px;}
.today-body.open{display:block;}

/* Setup */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center;}
.setup-icon{font-size:52px;margin-bottom:16px;}
.setup-title{font-size:22px;font-weight:600;margin-bottom:8px;}
.setup-desc{font-size:15px;color:var(--p2);margin-bottom:28px;max-width:280px;line-height:1.6;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.err{background:#fff2f2;border:1px solid #ffcdd2;color:#c62828;
  padding:10px 14px;border-radius:var(--rsm);font-size:13px;margin-bottom:12px;}

/* Utils */
hr{border:none;border-top:.5px solid var(--sep);margin:14px 0;}
.flex-bc{display:flex;justify-content:space-between;align-items:center;}
.flex-c{display:flex;align-items:center;}
.gap-8{gap:8px;}
.mt-12{margin-top:12px;}
.text-sm{font-size:13px;}
.text-xs{font-size:12px;}
.text-p2{color:var(--p2);}
.w100{width:100%;}
.empty{text-align:center;padding:32px 20px;color:var(--p2);}
.empty-icon{font-size:32px;margin-bottom:10px;}

/* Horizontal patient row */
.h-header,.h-row{
  display:grid;
  grid-template-columns:36px minmax(68px,100px) 1fr 2fr 44px 44px 60px;
  gap:8px;padding:8px 12px;align-items:start;
}
.h-header{
  font-size:11px;font-weight:600;color:var(--p2);text-transform:uppercase;
  letter-spacing:.3px;border-bottom:.5px solid var(--sep);
  padding:6px 12px;align-items:center;
}
.h-row{border-bottom:.5px solid var(--fill);}
.col-room{font-size:15px;font-weight:600;line-height:34px;}
.col-nc{display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px;}
.nc-lbl{font-size:10px;color:var(--p2);}
.cb-nc{width:18px;height:18px;cursor:pointer;accent-color:var(--green);margin-top:2px;}
.sw-danger input:checked+.sw-track{background:var(--red);}
.compact-ta{
  padding:7px 9px;resize:none;overflow:hidden;
  min-height:34px;line-height:1.5;font-size:13px;border-radius:6px;
}
.name-input{
  width:100%;border:none;background:transparent;font-size:14px;color:var(--p1);
  font-family:inherit;padding:0 6px;border-radius:6px;height:34px;outline:none;
}
.name-input:hover{background:var(--fill);}
.name-input:focus{background:var(--card);border:1px solid var(--blue);
  box-shadow:0 0 0 3px rgba(0,122,255,.12);}
.out-panel{background:var(--fill);border-top:.5px solid var(--sep);padding:12px;}
</style>
</head>
<body>

<nav class="nav">
  <button class="btn btn-ghost" style="padding:4px 8px;font-size:16px;font-weight:600;"
    onclick="showFacilityPicker()" id="nav-fac">施設を選択 ▾</button>
  <span class="nav-date" id="nav-date"></span>
  <div class="flex-c gap-8">
    <span id="settings-status" style="font-size:11px;color:var(--p2);white-space:nowrap;"></span>
    <button class="icon-btn" onclick="showPatientMgr()" title="患者管理">👥</button>
    <button class="icon-btn" onclick="showSettings()" title="設定">⚙️</button>
  </div>
</nav>

<div class="content" id="app"></div>

<div class="action-bar" id="action-bar" style="display:none">
  <button class="btn btn-secondary" onclick="downloadTxt()">⬇ ダウンロード</button>
  <button class="btn btn-primary" onclick="sendSlack()">✈ Slackに送信</button>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>

<script>
// ─── Constants & State ────────────────────────────────────────────────────────
const LS_FAC   = 'shisetsu_fac';
const LS_CUR   = 'shisetsu_cur';
const LS_TODAY = 'shisetsu_today';
const LS_API   = 'shisetsu_api';
const LS_PROXY = 'shisetsu_proxy_url';
const LS_TDATE = 'shisetsu_today_date';

// GASプロキシ経由でSlackに送る共通関数（CORS回避）
async function callProxy(payload) {
  const proxyUrl = (localStorage.getItem(LS_PROXY) || '').trim();
  if (!proxyUrl) throw new Error('GAS Proxy URLが未設定です');
  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  });
  if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
  return res.json();
}

let facilities   = [];
let currentFacId = null;
let todayVisits  = [];
const inputState = {}; // room -> {s, o, points, output, noChange}

// ─── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('nav-date').textContent = fmtDate(new Date());
  renderApp();
  updateSettingsStatus();
});

function load() {
  try { facilities  = JSON.parse(localStorage.getItem(LS_FAC)   || '[]'); } catch { facilities = []; }
  try { todayVisits = JSON.parse(localStorage.getItem(LS_TODAY)  || '[]'); } catch { todayVisits = []; }
  currentFacId = localStorage.getItem(LS_CUR) || null;
  if (currentFacId && !facilities.find(f => f.id === currentFacId)) currentFacId = null;
  // 日付が変わっていたら本日完了分をリセット
  if (localStorage.getItem(LS_TDATE) !== fmtDate(new Date())) {
    todayVisits = [];
    localStorage.removeItem(LS_TODAY);
  }
}

function save() {
  localStorage.setItem(LS_FAC,   JSON.stringify(facilities));
  localStorage.setItem(LS_TODAY, JSON.stringify(todayVisits));
  localStorage.setItem(LS_TDATE, fmtDate(new Date()));
  if (currentFacId) localStorage.setItem(LS_CUR, currentFacId);
}

function getFac() {
  return facilities.find(f => f.id === currentFacId) || null;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function renderApp() {
  const fac = getFac();
  document.getElementById('nav-fac').textContent =
    (fac ? fac.name : '施設を選択') + ' ▾';

  if (!fac) { renderSetup(); return; }

  const total = fac.patients.length;
  const done  = todayVisits.length;
  let html = '';

  // Progress
  if (total > 0) {
    const pct = Math.round(done / total * 100);
    html += `<div class="prog-wrap">
      <div class="prog-text">
        <span>本日の進捗　<span style="font-weight:600">${done} / ${total}名</span></span>
        <div class="flex-c gap-8">
          <button class="btn btn-secondary btn-sm" onclick="showBulkSOInput()">📋 S/O一括入力</button>
          <button class="btn btn-primary btn-sm" id="bulk-btn" onclick="generateAll()">⚡ 一括作成</button>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Dropzone (when no patients)
  if (total === 0) {
    html += `<div class="dropzone" id="dz"
      onclick="document.getElementById('fi').click()"
      ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
      <div class="dz-icon">📂</div>
      <div class="dz-title">前回記録ファイルをドロップ</div>
      <div class="dz-sub">.txt ファイルをドロップするか、クリックして選択</div>
    </div>
    <input type="file" id="fi" accept=".txt" style="display:none" onchange="onFileInput(event)">`;
  }

  // Patient list
  if (total > 0) {
    html += `<span class="sec-label">患者リスト</span><div class="card" id="plist">
      <div class="h-header">
        <span>室</span><span>氏名</span>
        <span>S（訴え）</span><span>O（診察サマリ）</span>
        <span style="text-align:center">${fac.hasA ? '診察あり' : '変更なし'}</span>
        <span style="text-align:center">入院中</span>
        <span></span>
      </div>`;
    fac.patients.forEach(p => { html += buildRow(p, fac); });
    html += `</div>
    <div style="text-align:center;margin-bottom:16px;display:flex;gap:8px;justify-content:center;">
      <button class="btn btn-ghost btn-sm text-xs" onclick="document.getElementById('fi2').click()">
        📂 ファイルを追加インポート</button>
      <input type="file" id="fi2" accept=".txt" style="display:none" onchange="onFileInput(event)">
      <button class="btn btn-ghost btn-sm text-xs" onclick="showPasteImport()">
        📋 テキストを貼り付けて追加</button>
    </div>`;
  }

  // Today completed
  if (done > 0) {
    html += `<span class="sec-label" style="margin-top:4px">本日完了分</span>`;
    todayVisits.forEach((v, i) => {
      html += `<div class="today-card">
        <div class="today-hd" onclick="toggleToday(${i})">
          <div>
            <span style="font-weight:600">${esc(v.room)}　${esc(v.name)}</span>
            <span class="text-xs text-p2" style="margin-left:8px">${esc(v.points)}</span>
          </div>
          <div class="flex-c gap-8">
            <button class="btn btn-danger btn-sm"
              onclick="event.stopPropagation();removeToday(${i})">削除</button>
            <span class="text-p2 text-xs" id="tc-${i}">▸</span>
          </div>
        </div>
        <div class="today-body" id="tb-${i}">
          <textarea rows="14" style="font-size:13px;line-height:1.8;"
            onchange="todayVisits[${i}].content=this.value;save()">${esc(v.content)}</textarea>
        </div>
      </div>`;
    });
  }

  document.getElementById('app').innerHTML = html;
  document.getElementById('action-bar').style.display = done > 0 ? 'flex' : 'none';

}

function buildRow(p, fac) {
  const isDone   = todayVisits.some(v => v.room === p.room);
  const isHosp   = p.hospitalized || false;
  const st       = inputState[p.room] || {};
  const noChange     = st.noChange || false;
  const hasShinsatsu = st.hasShinsatsu || false;
  const pts          = st.points !== undefined ? st.points : p.defaultPoints;
  const sVal         = st.s || '';
  const oVal         = st.o || '';
  const out      = st.output || '';

  const rowDim  = isDone ? 'opacity:.4;pointer-events:none;' : isHosp ? 'opacity:.4;' : '';
  const dis     = isDone || isHosp ? 'disabled' : '';

  let html = `<div style="${rowDim}">
    <div class="h-row">
      <span class="col-room">${esc(p.room)}</span>
      <input class="name-input" type="text" value="${esc(p.name)}" ${dis}
        onchange="updatePatientName('${esc(p.room)}',this.value)">
      <textarea class="compact-ta" id="s-${esc(p.room)}" rows="1" ${dis}
        oninput="storeInput('${esc(p.room)}','s',this.value);autoResize(this)">${esc(sVal)}</textarea>
      <div style="display:flex;flex-direction:column;gap:2px;min-width:0;">
        <textarea class="compact-ta" id="o-${esc(p.room)}" rows="1" ${dis}
          oninput="storeInput('${esc(p.room)}','o',this.value);autoResize(this)">${esc(oVal)}</textarea>
      </div>
      <div class="col-nc" style="pointer-events:${isDone?'none':'auto'}">
        ${fac.hasA
          ? `<input type="checkbox" class="cb-nc" ${hasShinsatsu?'checked':''} ${dis}
               onchange="toggleShinsatsu('${esc(p.room)}',this.checked)">`
          : `<input type="checkbox" class="cb-nc" ${noChange?'checked':''} ${dis}
               onchange="toggleNoChange('${esc(p.room)}',this.checked)">`}
      </div>
      <div class="col-nc" style="pointer-events:auto;opacity:1;">
        <label class="sw sw-danger" style="cursor:pointer">
          <input type="checkbox" ${isHosp?'checked':''}
            onchange="toggleHospitalized('${esc(p.room)}',this.checked)">
          <div class="sw-track"></div>
          <div class="sw-thumb"></div>
        </label>
      </div>
      ${isDone
        ? `<span class="badge badge-done" style="margin-top:5px">完了</span>`
        : isHosp
          ? `<span class="badge" style="background:#fff0f0;color:var(--red);margin-top:5px">入院中</span>`
          : `<button class="btn btn-primary btn-sm" style="margin-top:2px"
               id="gen-${esc(p.room)}" onclick="generateRecord('${esc(p.room)}')">作成</button>`}
    </div>
    <div id="err-${esc(p.room)}"></div>`;

  // Output panel — shown only after generation
  if (out && !isDone) {
    html += `<div class="out-panel">
      <div class="form-label" style="margin-bottom:6px">生成結果（編集可）</div>
      <textarea id="out-${esc(p.room)}" rows="14" style="font-size:13px;line-height:1.8;"
        oninput="inputState['${esc(p.room)}'].output=this.value">${esc(out)}</textarea>
      <button class="btn btn-primary btn-full" style="margin-top:8px"
        onclick="saveRecord('${esc(p.room)}')">✚ 一覧に追加して次の患者へ</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

// ─── Patient interactions ─────────────────────────────────────────────────────
function updatePatientName(room, name) {
  const fac = getFac();
  const p = fac?.patients.find(p => p.room === room);
  if (p && name.trim()) { p.name = name.trim(); save(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function storeInput(room, key, val) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room][key] = val;
}

function initSt(room) {
  const fac = getFac();
  const p   = fac?.patients.find(p => p.room === room);
  return { s:'', o:'', points: p?.defaultPoints||'342点', output:'', noChange:false, hasShinsatsu:false };
}

function getDeliveryRange() {
  const now   = new Date();
  const day   = now.getDay();
  const daysToNextMonday = ((8 - day) % 7) || 7;
  const start = new Date(now.getTime() + daysToNextMonday * 864e5);
  const end   = new Date(start.getTime() + 6 * 864e5);
  const s = `${start.getMonth()+1}/${start.getDate()}`;
  const e = `${end.getMonth()+1}/${end.getDate()}`;
  return { range: `${s}ー${e}`, start: s };
}

function toggleNoChange(room, checked) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room].noChange = checked;
  renderApp();
}

function toggleShinsatsu(room, checked) {
  if (!inputState[room]) inputState[room] = initSt(room);
  inputState[room].hasShinsatsu = checked;
}

function toggleHospitalized(room, checked) {
  const fac = getFac();
  const p = fac?.patients.find(p => p.room === room);
  if (!p) return;
  p.hospitalized = checked;
  save();
  renderApp();
}

// ─── Gemini ───────────────────────────────────────────────────────────────────
async function generateRecord(room) {
  const fac = getFac();
  const p   = fac.patients.find(p => p.room === room);
  const st  = inputState[room] || initSt(room);

  const sEl   = document.getElementById('s-' + room);
  const oEl   = document.getElementById('o-' + room);
  const sVal  = (sEl ? sEl.value : st.s).trim();
  const oVal  = (oEl ? oEl.value : st.o).trim();
  const prev  = (p.lastRecord || '').trim();
  const pts   = st.points || p.defaultPoints;

  if (sEl)   { st.s = sEl.value;   inputState[room] = st; }
  if (oEl)   { st.o = oEl.value;   inputState[room] = st; }

  const apiKey = localStorage.getItem(LS_API) || '';
  const errEl  = document.getElementById('err-' + room);
  errEl.innerHTML = '';

  if (!apiKey) {
    errEl.innerHTML = '<div class="err">⚠️ Gemini APIキーが未設定です。右上 ⚙️ から入力してください。</div>';
    return;
  }

  const btn = document.getElementById('gen-' + room);
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 生成中...';

  const now      = new Date();
  const reiwa    = now.getFullYear() - 2018;
  const reiwaStr = `R${reiwa}.${now.getMonth()+1}`;
  const dateStr  = `${now.getMonth()+1}/${now.getDate()}`;

  const noChange     = inputState[room]?.noChange || false;
  const hasShinsatsu = inputState[room]?.hasShinsatsu || false;
  const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);

  try {
    const data = await callGemini(apiKey, prompt);
    const text = normalize((data.candidates?.[0]?.content?.parts?.[0]?.text||'').trim());
    inputState[room].output = text;
    renderApp();
    setTimeout(() => {
      document.getElementById('out-' + room)?.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 120);
  } catch(e) {
    errEl.innerHTML = `<div class="err">⚠️ ${esc(e.message)}</div>`;
    const b = document.getElementById('gen-' + room);
    if (b) { b.disabled = false; b.innerHTML = '作成'; }
  }
}

async function callGemini(apiKey, prompt) {
  const models = ['gemini-2.5-flash', 'gemini-2.5-flash-lite'];
  let lastErr = null;
  for (const model of models) {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          system_instruction: { parts: [{ text: `あなたは訪問薬剤師の施設訪問記録作成を支援する専門アシスタントです。以下の方針で記載してください。\n・簡潔・正確な医療日本語で記載する\n・感情的表現・共感表現・励まし・お気持ち系の言葉は一切使わない\n・薬剤師としての専門的視点（薬効・副作用・相互作用）から客観的に記録する\n・患者の「気持ち」ではなく「状態」を記録する` }] },
          contents:[{parts:[{text:prompt}]}],
          generationConfig:{temperature:0.35} }) }
    );
    if (!res.ok) {
      const err = await res.json();
      lastErr = new Error(err.error?.message || `APIエラー(${res.status})`);
      if (!lastErr.message.includes('overloaded') && !lastErr.message.includes('high demand')) throw lastErr;
      continue;
    }
    return res.json();
  }
  throw lastErr || new Error('APIエラー');
}

function showBulkSOInput() {
  showModal(`
    <div class="form-group">
      <div class="form-label">S/O一括入力</div>
      <div class="text-xs text-p2" style="margin-bottom:8px">
        形式：部屋番号　S内容　O内容（全角スペース区切り）<br>
        例）201　落ち着いています。<br>
        　　202　掻痒感が続いています。　レボセチリジン追加しています。
      </div>
      <textarea id="bulk-so-input" rows="12" style="font-size:13px;line-height:1.8;"
        placeholder="201　落ち着いています。&#10;202　掻痒感が続いています。　レボセチリジン追加。"></textarea>
    </div>
  `, 'S/O一括入力',
  `<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
   <button class="btn btn-primary" onclick="applyBulkSO()">反映</button>`);

function applyBulkSO() {
  const raw = document.getElementById('bulk-so-input')?.value || '';
  const fac = getFac();
  if (!fac) return;

  let count = 0;
  for (const line of raw.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split('　');
    const room = parts[0]?.trim();
    if (!room || !fac.patients.find(p => p.room === room)) continue;
    if (!inputState[room]) inputState[room] = initSt(room);
    inputState[room].s = parts[1]?.trim() || '';
    inputState[room].o = parts.slice(2).join('　').trim();
    count++;
  }

  closeModal();
  showToast(`${count}名分のS/Oを反映しました`);
  renderApp();
  // テキストエリアのサイズ調整
  setTimeout(() => {
    fac.patients.forEach(p => {
      ['s-','o-'].forEach(pre => {
        const el = document.getElementById(pre + p.room);
        if (el) autoResize(el);
      });
    });
  }, 50);
}

async function generateAll() {
  const fac = getFac();
  if (!fac) return;

  const apiKey = localStorage.getItem(LS_API) || '';
  if (!apiKey) {
    showToast('⚠️ Gemini APIキーを設定してください');
    return;
  }

  const pending = fac.patients.filter(p =>
    !todayVisits.some(v => v.room === p.room) && !p.hospitalized
  );
  if (!pending.length) { showToast('全員完了済みです（入院中を除く）'); return; }

  const btn = document.getElementById('bulk-btn');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }

  let count = 0;
  for (const p of pending) {
    if (!inputState[p.room]) inputState[p.room] = initSt(p.room);
    const st = inputState[p.room];

    const now      = new Date();
    const reiwa    = now.getFullYear() - 2018;
    const reiwaStr = `R${reiwa}.${now.getMonth()+1}`;
    const dateStr  = `${now.getMonth()+1}/${now.getDate()}`;
    const pts      = st.points || p.defaultPoints;
    const sVal     = st.s || '';
    const oVal     = st.o || '';
    const prev     = p.lastRecord || '';
    const noChange     = inputState[p.room]?.noChange || false;
    const hasShinsatsu = inputState[p.room]?.hasShinsatsu || false;

    showToast(`${p.room}号室 作成中… (${count+1}/${pending.length})`, 60000);

    try {
      const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);
      const data   = await callGemini(apiKey, prompt);
      const text   = normalize((data.candidates?.[0]?.content?.parts?.[0]?.text||'').trim());

      // Auto-save directly to today list
      const rec = { room: p.room, name: p.name, points: pts, content: text };
      const idx = todayVisits.findIndex(v => v.room === p.room);
      if (idx >= 0) todayVisits[idx] = rec; else todayVisits.push(rec);
      todayVisits.sort((a, b) => Number(a.room) - Number(b.room));
      p.lastRecord  = text;
      p.lastUpdated = fmtDate(now);
      count++;
      save();
    } catch(e) {
      if (e.message.includes('429') || e.message.includes('RESOURCE_EXHAUSTED') || e.message.includes('quota')) {
        showToast(`レート制限に達しました。30秒待機中…`, 30000);
        await new Promise(r => setTimeout(r, 30000));
        // リトライ
        try {
          const prompt = buildPrompt(fac, p, sVal, oVal, prev, pts, reiwaStr, dateStr, noChange, hasShinsatsu);
          const data   = await callGemini(apiKey, prompt);
          const text   = normalize((data.candidates?.[0]?.content?.parts?.[0]?.text||'').trim());
          const rec = { room: p.room, name: p.name, points: pts, content: text };
          const idx = todayVisits.findIndex(v => v.room === p.room);
          if (idx >= 0) todayVisits[idx] = rec; else todayVisits.push(rec);
          p.lastRecord  = text;
          p.lastUpdated = fmtDate(now);
          count++;
          save();
        } catch(e2) {
          showToast(`${p.room}号室 エラー: ${e2.message}`, 4000);
        }
      } else {
        showToast(`${p.room}号室 エラー: ${e.message}`, 4000);
        await new Promise(r => setTimeout(r, 2000));
      }
    }
    // 7秒待機（無料枠：10リクエスト/分 = 6秒/リクエスト）
    if (count < pending.length) {
      showToast(`次の患者まで待機中… (${count}/${pending.length}完了)`, 7000);
      await new Promise(r => setTimeout(r, 7000));
    }
  }

  save();
  showToast(`一括作成完了：${count}名`);
  renderApp();
}

// ─── Save record ──────────────────────────────────────────────────────────────
function saveRecord(room) {
  const outEl   = document.getElementById('out-' + room);
  const content = outEl ? outEl.value.trim() : (inputState[room]?.output || '');
  if (!content) { showToast('生成結果がありません'); return; }

  const fac = getFac();
  const p   = fac.patients.find(p => p.room === room);
  const pts = inputState[room]?.points || p.defaultPoints;

  const rec = { room, name: p.name, points: pts, content };
  const idx = todayVisits.findIndex(v => v.room === room);
  if (idx >= 0) todayVisits[idx] = rec;
  else todayVisits.push(rec);
  todayVisits.sort((a, b) => Number(a.room) - Number(b.room));

  // Update patient last record
  p.lastRecord  = content;
  p.lastUpdated = fmtDate(new Date());

  save();
  delete inputState[room];
  showToast(`${room}号室 ${p.name} を保存しました`);
  renderApp();
}

// ─── Download ─────────────────────────────────────────────────────────────────
function downloadTxt() {
  if (!todayVisits.length) { showToast('ダウンロードする記録がありません'); return; }
  const fac = getFac();
  const today = new Date();
  const ds = `${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
  const fname = `${fac?.name||'施設'}_${ds}.txt`;

  const text = todayVisits.map(v =>
    `${v.room}　${v.name}　${v.points}\n\n${v.content}`
  ).join('\n\n\n');

  const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

  }
  if (!todayVisits.length) { showToast('送信する記録がありません'); return; }

  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const tmpl = fac.slackMessage || '{施設名}　{月}月{日}日に転記お願いします。';

  showModal(`
    <div class="form-group">
      <div class="form-label">日付を選択</div>

      <input type="text" id="slack-msg-preview" value="">
    </div>
    <div class="text-xs text-p2" style="margin-top:4px">${todayVisits.length}名分のファイルを添付して送信します</div>
  `, 'Slackに送信',
  `<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
   <button class="btn btn-primary" onclick="execSlackSend()">送信</button>`);

  // 初期プレビューを生成
  updateSlackPreview();
}

function updateSlackPreview() {
  const fac      = getFac();
  const dateEl   = document.getElementById('slack-date');
  const previewEl= document.getElementById('slack-msg-preview');
  if (!dateEl || !previewEl) return;

  const [y, m, d] = dateEl.value.split('-');
  const tmpl = fac.slackMessage || '{施設名}　{月}月{日}日に転記お願いします。';
  previewEl.value = tmpl
    .replace(/{施設名}/g, fac.name)
    .replace(/{月}/g, String(Number(m)))
    .replace(/{日}/g, String(Number(d)));
}

async function execSlackSend() {
  const fac     = getFac();
  const dateEl  = document.getElementById('slack-date');
  const msgEl   = document.getElementById('slack-msg-preview');
  const message = msgEl?.value || '';
  const dateVal = dateEl?.value || '';
  const ds      = dateVal.replace(/-/g, '');

  closeModal();

  const fname = `${fac.name}_${ds}.txt`;
  const text  = todayVisits.map(v =>
    `${v.room}　${v.name}　${v.points}\n\n${v.content}`
  ).join('\n\n\n');

  try {
    const data = await callProxy({
      token: fac.slackToken,
      channelId: fac.slackChannel,
      filename: fname,
      content: text,
      initialComment: message
    });
    if (!data.ok) throw new Error(data.error || 'unknown error');
    showToast('Slackに送信しました ✓');
  } catch(e) {
    showToast('送信エラー: ' + e.message);
  }
}

// ─── File import ──────────────────────────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById('dz')?.classList.add('over'); }
function onDragLeave()  { document.getElementById('dz')?.classList.remove('over'); }
function onDrop(e)      { e.preventDefault(); document.getElementById('dz')?.classList.remove('over');
  const f = e.dataTransfer.files[0]; if (f) readFile(f); }
function onFileInput(e) { const f = e.target.files[0]; if (f) readFile(f); e.target.value = ''; }

function readFile(file) {
  const r = new FileReader();
  r.onload = e => importText(e.target.result);
  r.readAsText(file, 'UTF-8');
}

function importText(raw) {
  const fac = getFac();
  if (!fac) return;

  const lines  = raw.split('\n');
  const blocks = [];
  let cur = null;

  for (const line of lines) {
    // 行頭の # を除去してから判定（###101　山田　太郎 などに対応）
    const stripped = line.replace(/^[#＃]+/, '').trim();
    const m = stripped.match(/^(\d{2,4})[　\s]*/);
    if (m && stripped.length <= 30 && !stripped.match(/^##[SOAEP]/)) {
      if (cur) blocks.push(cur);
      const parts = stripped.split(/[　\s]+/);
      const room = parts[0];
      const pointsStr = parts.find(p => p.endsWith('点')) || '';
      // 部屋番号・点数以外をすべて結合（姓名間スペース対応）
      const nameParts = parts.slice(1).filter(p => !p.endsWith('点') && p.trim());
      cur = {
        room,
        name  : nameParts.join(''),
        points: pointsStr,
        lines : []
      };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) blocks.push(cur);

  let added = 0, updated = 0;

  for (const b of blocks) {
    const rawBlock = b.lines.join('\n').trim();
    if (!rawBlock) continue;
    const start  = rawBlock.indexOf('##');
    const record = start >= 0 ? rawBlock.substring(start).trim() : rawBlock;

    const existing = fac.patients.find(p => p.room === b.room);
    if (existing) {
      existing.lastRecord  = record;
      existing.lastUpdated = fmtDate(new Date());
      if (b.name) existing.name = b.name;
      if (b.points) existing.defaultPoints = b.points;
      updated++;
    } else {
      fac.patients.push({
        room         : b.room,
        name         : b.name || `${b.room}号室`,
        defaultPoints: b.points || '342点',
        lastRecord   : record,
        lastUpdated  : fmtDate(new Date())
      });
      added++;
    }
  }

  fac.patients.sort((a, b) => Number(a.room) - Number(b.room));
  save();
  showToast(`取り込み完了：新規 ${added}名・更新 ${updated}名`);
  renderApp();
}

    room, name,
    defaultPoints: pts || '342点',

    lastUpdated  : dis ? fmtDate(new Date()) : ''
  });

  save();
  showToast(`${room}号室 ${name} を追加しました`);
  showPatientMgr();
}

function buildInitialOP(diseases) {
  const lines = diseases.split('\n').filter(l => l.trim());
  let op = '##OP##\n';
  for (const line of lines) {
    const parts   = line.trim().split(/[\s　]+/);
    const disease = parts[0] || '';
    const drugs   = parts.slice(1).join('、');
    if (disease) {
      op += `＃${disease}\n`;
      if (drugs) op += `　・${drugs}\n`;
    }
  }
  return op;
}

// ── Edit patient ──
function showEditPatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  showModal(`
    <div class="form-group">
      <div class="form-label">部屋番号</div>
      <input type="text" id="ep-room" value="${esc(p.room)}">
    </div>
    <div class="form-group">
      <div class="form-label">氏名</div>
      <input type="text" id="ep-name" value="${esc(p.name)}">
    </div>
    <div class="form-group">
      <div class="form-label">デフォルト算定点数</div>
      <input type="text" id="ep-pts" value="${esc(p.defaultPoints)}">
    </div>
    <div class="form-group">
      <div class="form-label">
        前回記録 / OP
        <span class="text-xs text-p2">${p.lastUpdated ? '最終: '+p.lastUpdated : '新患'}</span>
      </div>
      <textarea id="ep-rec" rows="10" style="font-size:12px">${esc(p.lastRecord||'')}</textarea>
    </div>
  `, `${esc(p.room)}号室 ${esc(p.name)}`,
  `<button class="btn btn-secondary" onclick="showPatientMgr()">キャンセル</button>
   <button class="btn btn-primary" onclick="updatePatient(${i})">保存</button>`);
}

function updatePatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  p.room          = document.getElementById('ep-room')?.value.trim() || p.room;
  p.name          = document.getElementById('ep-name')?.value.trim() || p.name;
  p.defaultPoints = document.getElementById('ep-pts') ?.value.trim() || p.defaultPoints;
  p.lastRecord    = document.getElementById('ep-rec') ?.value || '';
  fac.patients.sort((a, b) => Number(a.room) - Number(b.room));
  save(); showToast('更新しました'); showPatientMgr();
}

function deletePatient(i) {
  const fac = getFac();
  const p   = fac.patients[i];
  if (!confirm(`${p.room}号室 ${p.name} を削除しますか？`)) return;
  fac.patients.splice(i, 1);
  save(); showPatientMgr();
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function normalize(t) {
  return t
    .replace(/㎎/g,'mg').replace(/㎜/g,'mm').replace(/㎝/g,'cm')
    .replace(/㎞/g,'km').replace(/㎏/g,'kg').replace(/㎖/g,'mL')
    .replace(/㏄/g,'cc').replace(/㎡/g,'m2').replace(/℃/g,'°C')
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/[Ａ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/[ａ-ｚ]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/(\d)X/g, '$1×');
}

function fmtDate(d) {
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function showToast(msg, ms=2400) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
